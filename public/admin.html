<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>RailGuard - Admin Panel</title>
		<link
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
			rel="stylesheet"
		/>
		<style>
			:root {
				--primary-color: #1a365d;
				--secondary-color: #2d4a63;
				--light-blue: #ebf8ff;
				--white: #ffffff;
				--light-gray: #f7fafc;
				--text-dark: #2d3748;
				--text-light: #718096;
				--shadow-light: rgba(0, 0, 0, 0.05);
				--border-radius: 12px;
				--transition: all 0.3s ease;
			}
			body {
				font-family: "Inter", sans-serif;
				background: var(--light-gray);
				color: var(--text-dark);
				margin: 0;
			}
			.hidden {
				display: none !important;
			}
			.login-page {
				display: flex;
				align-items: center;
				justify-content: center;
				min-height: 100vh;
				background: var(--secondary-color);
			}
			.login-container {
				background: var(--white);
				padding: 2.5rem;
				border-radius: var(--border-radius);
				box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
				width: 100%;
				max-width: 400px;
				text-align: center;
			}
			.login-container h1 {
				color: var(--primary-color);
				margin-bottom: 1.5rem;
			}
			.form-control {
				width: 100%;
				padding: 0.75rem;
				border: 1px solid #cbd5e0;
				border-radius: 8px;
				font-size: 1rem;
				margin-bottom: 1rem;
			}
			.btn {
				padding: 0.75rem 1.5rem;
				border-radius: 8px;
				border: none;
				cursor: pointer;
				font-weight: 600;
				transition: var(--transition);
				background: var(--primary-color);
				color: var(--white);
				width: 100%;
			}
			.navbar {
				background: var(--white);
				padding: 1rem 2rem;
				box-shadow: 0 2px 20px var(--shadow-light);
				display: flex;
				justify-content: space-between;
				align-items: center;
			}
			.nav-brand {
				display: flex;
				align-items: center;
				gap: 1rem;
				font-size: 1.5rem;
				color: var(--primary-color);
				font-weight: bold;
			}
			.logout-btn {
				background: #e53e3e;
				color: white;
				padding: 0.5rem 1rem;
				border-radius: 8px;
				border: none;
				cursor: pointer;
			}
			.section-container {
				max-width: 1200px;
				margin: 2rem auto;
				padding: 0 2rem;
			}
			.chat-container {
				display: flex;
				height: 75vh;
				background: var(--white);
				border-radius: var(--border-radius);
				box-shadow: 0 4px 20px var(--shadow-light);
				overflow: hidden;
			}
			.conversations-list {
				width: 35%;
				border-right: 1px solid #e2e8f0;
				overflow-y: auto;
			}
			.conversation {
				padding: 1rem;
				cursor: pointer;
				border-bottom: 1px solid #e2e8f0;
				transition: var(--transition);
			}
			.conversation:hover {
				background: var(--light-gray);
			}
			.conversation.active {
				background: var(--light-blue);
				border-right: 3px solid var(--primary-color);
			}
			.conversation h4 {
				margin: 0 0 0.25rem;
			}
			.conversation p {
				margin: 0;
				font-size: 0.85rem;
				color: var(--text-light);
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}
			.chat-window {
				width: 65%;
				display: flex;
				flex-direction: column;
			}
			.chat-messages {
				flex-grow: 1;
				padding: 1.5rem;
				overflow-y: auto;
				display: flex;
				flex-direction: column;
				gap: 1rem;
			}
			.message-bubble {
				padding: 0.75rem 1rem;
				border-radius: 18px;
				max-width: 80%;
				line-height: 1.4;
				word-wrap: break-word;
			}
			.message-bubble.user {
				background: #e2e8f0;
				color: var(--text-dark);
				border-bottom-left-radius: 4px;
				align-self: flex-start;
			}
			.message-bubble.admin {
				background: var(--primary-color);
				color: var(--white);
				border-bottom-right-radius: 4px;
				align-self: flex-end;
			}
			.chat-input {
				padding: 1rem;
				border-top: 1px solid #e2e8f0;
				display: flex;
				gap: 1rem;
			}
			#no-convo-selected {
				text-align: center;
				padding: 4rem;
				color: var(--text-light);
				margin: auto;
			}
		</style>
	</head>
	<body>
		<!-- Admin Login Page -->
		<div id="adminLoginPage" class="login-page">
			<div class="login-container">
				<h1><i class="fas fa-user-shield"></i> Admin Portal</h1>
				<form id="adminLoginForm">
					<input
						type="text"
						id="adminUsername"
						class="form-control"
						placeholder="Admin Username"
						required
					/>
					<input
						type="password"
						id="adminPassword"
						class="form-control"
						placeholder="Password"
						required
					/>
					<button type="submit" class="btn">Login</button>
				</form>
				<p
					id="adminLoginError"
					class="hidden"
					style="color: #e53e3e; margin-top: 1rem"
				></p>
			</div>
		</div>

		<!-- Admin Dashboard -->
		<div id="adminDashboardPage" class="hidden">
			<nav class="navbar">
				<div class="nav-brand">
					<i class="fas fa-user-shield"></i>
					<span>RailGuard Admin</span>
				</div>
				<button class="logout-btn" id="adminLogoutBtn">
					<i class="fas fa-sign-out-alt"></i> Logout
				</button>
			</nav>
			<div class="section-container">
				<div class="chat-container">
					<div class="conversations-list" id="conversationsList">
						<!-- Conversations will be loaded here -->
					</div>
					<div class="chat-window">
						<div class="chat-messages" id="chatMessages">
							<p id="no-convo-selected">
								<i class="fas fa-arrow-left"></i> Select a conversation to
								start.
							</p>
						</div>
						<div class="chat-input hidden" id="chatInputArea">
							<input
								type="text"
								id="adminReplyInput"
								class="form-control"
								placeholder="Type your reply..."
							/>
							<button id="sendReplyBtn" class="btn" style="width: auto">
								Send
							</button>
						</div>
					</div>
				</div>
			</div>
		</div>

		<script src="/socket.io/socket.io.js"></script>
		<script>
			// This is the script for the DEDICATED ADMIN PAGE
			document.addEventListener("DOMContentLoaded", () => {
				const adminLoginPage = document.getElementById("adminLoginPage");
				const adminDashboardPage =
					document.getElementById("adminDashboardPage");
				const adminLoginForm = document.getElementById("adminLoginForm");
				const adminLogoutBtn = document.getElementById("adminLogoutBtn");

				const adminLoginError = document.getElementById("adminLoginError");
				const socket = io();
				let messageDatabase = {};
				let activeConversationId = null;

				// All the chat UI elements
				const conversationsList = document.getElementById("conversationsList");
				const chatMessages = document.getElementById("chatMessages");
				const chatInputArea = document.getElementById("chatInputArea");
				const adminReplyInput = document.getElementById("adminReplyInput");
				const sendReplyBtn = document.getElementById("sendReplyBtn");
				const noConvoSelected = document.getElementById("no-convo-selected");

				// Check if admin is already logged in (using sessionStorage)
				function checkAdminLogin() {
					if (sessionStorage.getItem("railguard_admin_token")) {
						adminLoginPage.classList.add("hidden");
						adminDashboardPage.classList.remove("hidden");
						fetchAndLoadMessages();
					} else {
						adminLoginPage.classList.remove("hidden");
						adminDashboardPage.classList.add("hidden");
					}
				}

				adminLoginForm.addEventListener("submit", async (e) => {
					e.preventDefault();
					adminLoginError.classList.add("hidden"); // Hide previous errors
					const username = document.getElementById("adminUsername").value;
					const password = document.getElementById("adminPassword").value;

					const response = await fetch("/api/admin/login", {
						method: "POST",
						headers: { "Content-Type": "application/json" },
						body: JSON.stringify({ username, password }),
					});

					if (response.ok) {
						sessionStorage.setItem("railguard_admin_token", "true"); // Simple token
						checkAdminLogin();
					} else {
						const data = await response.json();
						adminLoginError.textContent =
							data.message || "Invalid credentials.";
						adminLoginError.classList.remove("hidden");
					}
				});

				adminLogoutBtn.addEventListener("click", () => {
					sessionStorage.removeItem("railguard_admin_token");
					// Redirect to the main user login page instead of showing the admin login again.
					window.location.href = "/";
				});

				// --- Chat functionality (moved from index.html) ---
				async function fetchAndLoadMessages() {
					const response = await fetch("/api/messages");
					if (response.ok) {
						messageDatabase = await response.json();
						loadConversations();
					}
				}

				function loadConversations() {
					conversationsList.innerHTML = "";
					Object.keys(messageDatabase).forEach((convoId) => {
						const convo = messageDatabase[convoId];
						if (!convo.messages || convo.messages.length === 0) return;
						const lastMessage = convo.messages[convo.messages.length - 1];
						const convoDiv = document.createElement("div");

						// --- UI Improvement: Categorize messages ---
						let icon = "fa-comment-dots"; // Default for feedback
						if (lastMessage.text.startsWith("HYGIENE")) icon = "fa-broom";
						if (lastMessage.text.startsWith("OVERPRICING"))
							icon = "fa-rupee-sign";
						if (lastMessage.text.startsWith("REFUND")) icon = "fa-undo";
						if (lastMessage.text.startsWith("WATER REFILL")) icon = "fa-tint";
						if (lastMessage.text.startsWith("SUSPICIOUS"))
							icon = "fa-exclamation-triangle";

						convoDiv.className = "conversation";
						convoDiv.dataset.convoId = convoId;
						convoDiv.innerHTML = `
						<div style="display: flex; align-items: center; gap: 10px;">
							<i class="fas ${icon}" style="color: var(--primary-color);"></i>
							<div>
								<h4>${convo.user}</h4>
								<p>${lastMessage.text.substring(0, 30)}${
							lastMessage.text.length > 30 ? "..." : ""
						}</p>
							</div>
						</div>`;

						/* Original line:
						`<h4><i class="fas fa-user"></i> ${
							convo.user
						}</h4><p>${lastMessage.text.substring(0, 30)}${
							lastMessage.text.length > 30 ? "..." : ""
						}</p>`;*/
						convoDiv.addEventListener("click", () => loadMessages(convoId));
						conversationsList.appendChild(convoDiv);
					});
				}

				function loadMessages(convoId) {
					activeConversationId = convoId;
					const conversation = messageDatabase[convoId];
					chatMessages.innerHTML = "";
					noConvoSelected.classList.add("hidden");
					conversation.messages.forEach((msg) => {
						const bubble = document.createElement("div");
						const timestamp = new Date(msg.timestamp).toLocaleTimeString([], {
							hour: "2-digit",
							minute: "2-digit",
						});
						bubble.className = `message-bubble ${msg.sender}`;
						bubble.innerHTML = `${msg.text} ${
							msg.imageUrl
								? `<br><a href="${msg.imageUrl}" target="_blank"><img src="${msg.imageUrl}" alt="User Upload" style="max-width: 200px; border-radius: 8px; margin-top: 8px;"></a>`
								: ""
						}<div style="font-size: 0.75rem; text-align: right; opacity: 0.7; margin-top: 5px;">${timestamp}</div>`;
						chatMessages.appendChild(bubble);
					});
					document
						.querySelectorAll(".conversation")
						.forEach((c) => c.classList.remove("active"));
					document
						.querySelector(`.conversation[data-convo-id="${convoId}"]`)
						.classList.add("active");
					chatInputArea.classList.remove("hidden");
					chatMessages.scrollTop = chatMessages.scrollHeight;
				}

				function sendAdminReply() {
					const replyText = adminReplyInput.value.trim();
					if (replyText && activeConversationId) {
						socket.emit("sendMessage", {
							convoId: activeConversationId,
							user: messageDatabase[activeConversationId].user,
							sender: "admin",
							text: replyText,
						});
						adminReplyInput.value = "";
					}
				}

				sendReplyBtn.addEventListener("click", sendAdminReply);
				adminReplyInput.addEventListener("keyup", (e) => {
					if (e.key === "Enter") sendAdminReply();
				});

				socket.on("newMessage", (data) => {
					messageDatabase[data.convoId] = {
						user: data.user,
						messages: data.messages,
					};
					loadConversations();
					if (activeConversationId === data.convoId) {
						loadMessages(data.convoId);
					}
				});

				// Initial load
				checkAdminLogin();
			});
		</script>
	</body>
</html>
